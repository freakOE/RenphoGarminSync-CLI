name: Renpho to Garmin Sync

on:
  schedule:
    # Jeden Tag um 06:00 Uhr UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Ermöglicht manuellen Start

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Sync-Tool installieren
        run: pip install renphogarminsync

      - name: Sync ausführen
        # Hier werden deine Secrets als Umgebungsvariablen geladen
        env:
          RENPHO_EMAIL: ${{ secrets.RENPHO_USER }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_USER }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: renphogarminsync
