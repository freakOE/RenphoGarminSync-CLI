name: Renpho to Garmin Sync

on:
  schedule:
    # Läuft jeden Tag um 06:00 Uhr UTC (ca. 07:00/08:00 Uhr deutsche Zeit)
    - cron: '0 10 * * *'
  workflow_dispatch: # Ermöglicht den manuellen Start per Button

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.0.x' # Je nach Projekt-Version evtl. auf '7.0.x' oder '8.0.x' anpassen, falls es immer noch meckert

    - name: Install dependencies
      run: dotnet restore

    - name: Run Sync
      env:
        RENPHO_EMAIL: ${{ secrets.RENPHO_USER }}
        RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
        GARMIN_EMAIL: ${{ secrets.GARMIN_USER }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      # HIER IST DIE ÄNDERUNG: "--project RenphoGarminSync.Console"
      run: |
        dotnet run --project RenphoGarminSync.Console -- \
        --renpho-email "$RENPHO_USER" \
        --renpho-password "$RENPHO_PASSWORD" \
        --garmin-email "$GARMIN_USER" \
        --garmin-password "$GARMIN_PASSWORD"
