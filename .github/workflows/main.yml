name: Renpho to Garmin Sync

on:
  schedule:
    # Läuft jeden Tag um 06:00 Uhr UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.0.x'

    - name: Install dependencies
      run: dotnet restore

    - name: Run Sync
      env:
        RENPHO_EMAIL: ${{ secrets.RENPHO_USER }}
        RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
        GARMIN_EMAIL: ${{ secrets.GARMIN_USER }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      shell: bash
      run: |
        dotnet run --project RenphoGarminSync.Console -- sync \
        --renphoUsername "$RENPHO_EMAIL" \
        --renphoPassword "$RENPHO_PASSWORD" \
        --garminUsername "$GARMIN_EMAIL" \
        --garminPassword "$GARMIN_PASSWORD"
