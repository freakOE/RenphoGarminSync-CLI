name: Renpho to Garmin Sync
on:
  schedule:
    - cron: '0 7 * * *' # Täglich um 07:00 Uhr UTC
  workflow_dispatch: # Ermöglicht manuelles Starten

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests cloudscraper 

      - name: Run Sync
        env:
          RP_USER: ${{ secrets.RENPHO_USER }}
          RP_PASS: ${{ secrets.RENPHO_PASSWORD }}
          GA_USER: ${{ secrets.GARMIN_USER }}
          GA_PASS: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          python rgs.py --ru "$RP_USER" --rpw "$RP_PASS" --gu "$GA_USER" --gpw "$GA_PASS"
          
