name: Renpho to Garmin Sync

on:
  schedule:
    # Läuft jeden Tag um 06:00 Uhr UTC (ca. 07:00/08:00 Uhr deutsche Zeit)
    - cron: '0 6 * * *'
  workflow_dispatch: # Ermöglicht den manuellen Start per Button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.0.x'

    - name: Install dependencies
      run: dotnet restore

    - name: Run Sync
      env:
        # Hier greift das Skript auf deine Secrets zu
        RENPHO_EMAIL: ${{ secrets.RENPHO_USER }}
        RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
        GARMIN_EMAIL: ${{ secrets.GARMIN_USER }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      run: |
        dotnet run --project RenphoGarminSync-CLI -- \
        --renpho-email "$RENPHO_EMAIL" \
        --renpho-password "$RENPHO_PASSWORD" \
        --garmin-email "$GARMIN_EMAIL" \
        --garmin-password "$GARMIN_PASSWORD"
