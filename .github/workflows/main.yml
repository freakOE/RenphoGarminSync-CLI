name: Renpho to Garmin Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

env:
  # Verhindert Node-Warnungen in der 2026er Umgebung
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v5

      - name: Python installieren
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Tool installieren
        # Wir nutzen jetzt den korrekten Namen mit Bindestrichen
        run: pip install renpho-garmin-sync

      - name: Sync ausführen
        env:
          RENPHO_EMAIL: ${{ secrets.RENPHO_USER }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_USER }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        # Der Befehl heißt bei diesem Paket genau wie der Installationsname
        run: renpho-garmin-sync
